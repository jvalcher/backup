
##########
## MISC ##
##########

# Start tmux session in cwd
bind M-c attach-session -c "#{pane_current_path}"

# Startup script
#set-hook -g session-created 'send-keys "~/.bin/startup" Enter'

# Prevent duplicate PATHs 
set-option -g default-command bash

# Reduce esc key lag in vim
set -sg escape-time 0

# Fix pane navigation issue with Alt + m,j,k,l
set-option -g repeat-time 200

# History limit
set -g history-limit 5000

# focus events
set-option -g focus-events on

# Color mode
set -a terminal-features 'xterm-256color:RGB'

# Set new panes and windows to open in current directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Required for image.nvim
set -gq allow-passthrough on
set -g visual-activity off

run-shell 'tmux set-environment -g PATH "/home/linuxbrew/.linuxbrew/bin:$PATH"'


##################
## KEY BINDINGS ##
##################

# Map prefix to 'Ctrl-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Kill current session
bind x kill-session

# Close current window
bind w killw

# Close current pane
bind p kill-pane

# Switch sessions
bind [ switch-client -n
bind ] switch-client -p

# Reload configuration
bind c source-file ~/.tmux.conf \; display '~/.tmux.conf sourced'

# Respawn window
bind r respawn-pane -k -c "#{pane_current_path}"\; display 'Pane respawned'

# Rename window
bind n command-prompt -p "Rename window:" "rename-window '%%'"


####################
## Windows, panes ##
####################

# Create new window (ctrl + t)
bind -n C-t new-window -c "#{pane_current_path}"

# Navigate windows (ctrl + h,l)
bind -n C-h previous-window
bind -n C-l next-window

# Change current window order (ctrl + j,k)
bind -n C-j swap-window -d -t -1
bind -n C-k swap-window -d -t +1

# Split panes (ctrl + o,e)
bind -n C-o split-window -v -c "#{pane_current_path}"
bind -n C-e split-window -h -c "#{pane_current_path}"

# Switch panes (alt + h,j,k,l)
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

# Resize pane (alt + arrow keys)
bind -n M-Left resize-pane -L
bind -n M-Right resize-pane -R
bind -n M-Up resize-pane -U
bind -n M-Down resize-pane -D

# CLI vi copy mode
set-option -g mouse on
setw -g mode-keys vi
set-option -s set-clipboard off
bind p paste-buffer
unbind -T copy-mode-vi Enter
unbind -T copy-mode-vi C-h
unbind-key -T copy-mode-vi v
bind-key -T copy-mode-vi v send-keys -X begin-selection  # visual mode
bind-key -T copy-mode-vi 'C-v' send -X begin-selection \; send -X rectangle-toggle  # visual block
bind-key -T copy-mode-vi A send-keys -X end-of-line  # go to end of line
bind-key -T copy-mode-vi I send-keys -X back-to-indentation  # go to beginning of line

    # Enter vi copy mode (ctrl + y), exit (q)
bind -n C-y copy-mode

	# Scroll screen up, down (ctrl + m,n)
bind-key -T copy-mode-vi 'C-m' send-keys -X scroll-up  # scroll up
bind-key -T copy-mode-vi 'C-n' send-keys -X scroll-down  # scroll down

    # Enter vi copy mode and jump to last prompt (Ctrl + w)
bind -n 'C-w' copy-mode \;\
    send-keys -X start-of-line \;\
    send-keys -X search-backward '\$' \;\

    # Copy selection to clipboard (y)
if-shell -b '[ -z $WSLENV ]' {   # linux
    bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
    bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "xclip -selection clipboard -in"
}
if-shell -b 'test -n "$WSLENV"' {    # WSL
    bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'tmux show-buffer | clip.exe'
    bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear 'tmux show-buffer | clip.exe'
}



#############
## STYLING ##
#############

# Window name formatting
set -g status-style 'bg=default'
set-window-option -g window-status-format "#[fg=colour216 bg=colour235] #I #[fg=colour33]#{=16:window_name} "
set-window-option -g window-status-current-format "#[fg=colour216 bg=colour24] #I #{=16:window_name} "

# Pane styling
set -g pane-border-format ''
set -g pane-border-status top
set -g pane-active-border-style 'fg=colour216 bg=default'
set -g pane-border-style 'fg=colour26 bg=default'

# status bar position
set -g status-position top
set -g status-justify left
set -g status-left ' '
set -g status-left-length 20
set -g status-right-length 30
set -gq status-right "#[fg=colour33 bold]#(whoami)#[fg=colour15 bold]@#[fg=colour40 bold]#{host} "



#############
## Plugins ##
#############

run-shell ~/Repos/tmux-resurrect/resurrect.tmux
set -g @resurrect-strategy-vim 'session'    # requires tpope/vim-obsession
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-processes 'lazygit'
set -g @resurrect-capture-pane-contents 'on'
